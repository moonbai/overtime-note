name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore from Secret
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ env.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Release APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: overtime-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Debug APK to Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: overtime-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload mapping file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
